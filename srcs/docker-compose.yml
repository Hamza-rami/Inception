services:
  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    env_file:
      - ./.env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    env_file:
      - ./.env
    volumes:
        - wordpress_data:/var/www/html
    networks:
        - inception
    depends_on:
      - mariadb
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    env_file:
        - ./.env
    volumes:
        - wordpress_data:/var/www/html
    networks:
        - inception
    ports:
        - 443:443
    depends_on:
      - wordpress
    

networks:
  inception:
volumes:
  mariadb_data:
  wordpress_data: