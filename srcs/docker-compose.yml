services:
  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    env_file:
      - ./.env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    env_file:
      - ./.env
    volumes:
        - wordpress_data:/var/www/html
    networks:
        - inception
    depends_on:
      - mariadb
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    env_file:
        - ./.env
    volumes:
        - wordpress_data:/var/www/html
    networks:
        - inception
    ports:
        - 443:443
    depends_on:
      - wordpress
  redis:
    container_name: redis
    build: ./requirements/bonus/redis
    networks:
      - inception
  ftp:
    container_name: ftp
    build: ./requirements/bonus/ftp
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    networks:
      - inception
    

networks:
  inception:
volumes:
  mariadb_data:
  wordpress_data: